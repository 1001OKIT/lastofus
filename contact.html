    <div class="banner">

    <div class="row">
        <div class="left_side_bar">
            <h3>Left Side Bar</h3>
        </div>
        <div class="content">
    <h1>Contact Us</h1>
    <p>This is the contact page of our website.</p>

    <form action="">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter Your Name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter Your Email" required><br><br>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" maxlength="13" placeholder="Enter Your Phone Number" required><br><br>

        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject" placeholder="Enter Subject" required><br><br>

        <label for="message">Message:</label>
        <textarea id="message" name="message" cols="30" rows="10" placeholder="Enter your message here"></textarea><br><br>

        <button type="submit">Send Message</button><br>


    </form>

    <dl>
        <dt>Email</dt>
        <dd><a href="mailto:bbit@example.com">bbit@example.com</a></dd>
        <dt>Phone</dt>
        <dd><a href="tel:+1234567890">+1234567890</a></dd>
        <dt>Address</dt>
        <dd>123 Mada, Nairobi</dd>
    </dl>
        </div>
        <div class="right_side_bar">
            <h3>Right Side Bar</h3>
        </div>
